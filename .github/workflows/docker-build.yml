name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
      - 'dev-*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image version and determine tags
        id: versioning
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          echo "version=$ref" >> "$GITHUB_OUTPUT"
          if [[ "$ref" == v* ]]; then
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$ref,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$ref" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.versioning.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release (stable only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: pia-wg-config ${{ github.ref_name }}
          body: |
            ## What's New

            ### Resilient Server-List Fetching

            `pia-wg-config` now retries transient server-list fetch failures internally,
            making container startup substantially more reliable on Docker bridge networking
            where `serverlist.piaservers.net` is intermittently unreachable.

            **Default retry behavior (no new flags needed):**
            - Up to 5 attempts with fixed backoff: 2s, 5s, 10s, 20s, 30s
            - Retries on: connect timeout, TLS timeout, DNS failure, HTTP 429/5xx
            - Does not retry: invalid credentials, invalid region, malformed responses

            ### Optional Server-List Cache

            Cache the PIA server-list JSON on a persistent volume so config generation
            can proceed even when the server-list endpoint is unreachable:

            ```bash
            pia-wg-config -r ca_toronto -p -o wg0.conf \
              --serverlist-cache /state/cache/pia-serverlist-v6.json \
              --serverlist-cache-ttl 24h \
              --serverlist-cache-max-age 168h \
              USERNAME PASSWORD
            ```

            Cache policy:
            - Age ≤ TTL → use cache, no network request
            - TTL < age ≤ max-age → try to refresh; fall back to stale on failure with a warning
            - Age > max-age → must refresh; fails clearly if unreachable

            Force a fresh fetch even when cache is fresh:
            ```bash
            pia-wg-config --serverlist-force-refresh ...
            ```

            ### New CLI Flags

            | Flag | Default | Description |
            |---|---|---|
            | `--serverlist-cache PATH` | (none) | Path to server-list cache file |
            | `--serverlist-cache-ttl DURATION` | `24h` | Max age to use cache without refresh |
            | `--serverlist-cache-max-age DURATION` | `168h` | Max age before cache is treated as invalid |
            | `--serverlist-force-refresh` | `false` | Force fresh server-list fetch |
            | `--serverlist-fetch-retries N` | `5` | Max server-list fetch attempts |

            ### Metadata Contract Unchanged

            The `--json` output schema is identical to v1.2.0. No new fields added.

            ### Docker

            ```
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
